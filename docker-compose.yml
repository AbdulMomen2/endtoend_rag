version: '3.8'

services:
  # ==========================================
  # Frontend — React + nginx
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag_frontend
    ports:
      - "80:80"
    depends_on:
      rag_api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rag_network

  # ==========================================
  # Backend — FastAPI
  # ==========================================
  rag_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_api
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - FAISS_INDEX_PATH=/app/vector_db/faiss_index
      - CHUNK_SIZE=512
      - CHUNK_OVERLAP=50
      - EMBEDDING_MODEL=text-embedding-3-small
      - REDIS_ENABLED=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - vector_db:/app/vector_db   # Writable — upload rebuilds index
      - ./models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - rag_network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  # ==========================================
  # Redis — cache + session store
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: rag_redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - rag_network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  rag_network:
    driver: bridge

volumes:
  vector_db:
  redis_data:
